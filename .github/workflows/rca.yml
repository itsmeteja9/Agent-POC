name: Auto RCA Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rca-job:
    runs-on: ubuntu-latest

    steps:

    - name: ✅ Checkout code
      uses: actions/checkout@v4

    - name: ✅ Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: 🧪 Run tests
      run: |
        set -o pipefail
        pytest -q > logs.txt 2>&1

    - name: 📊 Collect logs
      if: always()
      run: |
        if [ -f logs.txt ]; then
          echo "=== Collected Logs ==="
          cat logs.txt
        fi

    - name: 🚀 Run RCA Agent
      if: failure()
      run: |
        python rca/run_rca.py | tee rca_output.txt

    - name: 📦 Upload RCA Artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: rca-report
        path: rca_output.txt
        retention-days: 30

    - name: 📤 Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: logs.txt
        retention-days: 30

    - name: 💬 Comment RCA on PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const rcaReport = fs.readFileSync('rca_output.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## RCA Analysis Report\n\n\`\`\`\n${rcaReport}\n\`\`\``
          });

    - name: ✅ Build Success
      if: success()
      run: echo "Pipeline completed successfully!"


name: Auto RCA Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rca-job:
    runs-on: ubuntu-latest
    
    steps:

    - name: ✅ Checkout code
      uses: actions/checkout@v3

    - name: ✅ Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: ❌ Simulate Pipeline Failure
      id: build
      continue-on-error: true
      run: |
        echo "[Pipeline] Start build" > logs.txt
        echo "[Pipeline] Running tests" >> logs.txt
        echo "ERROR: Test suite failed: 12 failed, 5 passed" >> logs.txt
        echo "[Pipeline] Build failed" >> logs.txt
        echo "[Pipeline] Deployment aborted" >> logs.txt

        cat logs.txt
        exit 1

    - name: 🚀 Run RCA Agent
      if: failure()
      id: rca
      run: |
        python rca/run_rca.py | tee rca_output.txt
        echo "RCA analysis completed"

    - name: 📦 Upload RCA Artifact
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: rca-report
        path: rca_output.txt
        retention-days: 30

    - name: 💬 Comment RCA on PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const rcaReport = fs.readFileSync('rca_output.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## RCA Analysis Report\n\n\`\`\`\n${rcaReport}\n\`\`\``
          });

    - name: ✅ Build Success
      if: success()
      run: echo "Pipeline completed successfully!"


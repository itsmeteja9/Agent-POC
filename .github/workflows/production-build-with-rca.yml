name: Production Build with RCA

# This is an example workflow showing how to integrate RCA Agent
# into a real production build pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:

    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      id: install
      run: |
        python -m pip install --upgrade pip
        # pip install -r requirements.txt
        # pip install pytest pytest-cov
        echo "Dependencies installed" >> build.log

    - name: 🧪 Run tests
      id: tests
      continue-on-error: true
      run: |
        echo "[Test Suite] Starting tests..." >> build.log
        # pytest tests/ -v --tb=short >> build.log 2>&1 || echo "Tests failed"
        echo "[Test Suite] Test run completed" >> build.log
        # Fail intentionally to demonstrate RCA
        echo "ERROR: Some tests failed" >> build.log
        exit 1

    - name: 🔨 Build application
      id: build
      if: success()
      run: |
        echo "[Build] Starting build process..." >> build.log
        # python setup.py build >> build.log 2>&1
        echo "[Build] Build completed successfully" >> build.log

    - name: 📊 Collect logs before RCA
      if: always()
      run: |
        # Combine all logs into a single file for RCA analysis
        if [ -f build.log ]; then
          cat build.log > logs.txt
        fi
        if [ -f pytest.log ]; then
          cat pytest.log >> logs.txt
        fi
        # Display collected logs
        echo "=== Collected Logs ===" 
        cat logs.txt || echo "No logs found"

    - name: 🚀 Run RCA Agent
      if: failure()
      id: rca
      continue-on-error: true
      run: |
        python rca/run_rca.py | tee rca_output.txt
        echo "RCA analysis completed"

    - name: 📦 Upload RCA Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: rca-report
        path: rca_output.txt
        retention-days: 30

    - name: 📤 Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: logs.txt
        retention-days: 30

    - name: 💬 Comment RCA on PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          try {
            const rcaReport = fs.readFileSync('rca_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Root Cause Analysis\n\n\`\`\`json\n${rcaReport}\n\`\`\`\n\n*Analysis provided by RCA Agent*`
            });
          } catch (e) {
            console.log('Could not post RCA comment');
          }

    - name: 📧 Notify on Failure (Optional)
      if: failure()
      uses: 8398a7/action-slack@v3
      continue-on-error: true
      with:
        status: ${{ job.status }}
        text: 'Build failed! RCA report available in artifacts.'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,author,action

    - name: ✅ Build Success
      if: success()
      run: echo "✅ Pipeline completed successfully!"
